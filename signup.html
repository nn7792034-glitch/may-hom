<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>

<style>
body{
font-family:Tahoma;
background:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#4caf50;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">

<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم الكامل">

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة السر">

<button onclick="alert('تم إنشاء الحساب بنجاح')">
إنشاء حساب
</button>

</div>

</body>
</html>
