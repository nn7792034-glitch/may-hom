<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<h1>لوحة التحكم شغالة</h1>

<style>
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}
background: linear-gradient(-45deg,
#0f0c29,
#302b63,
#24243e,
#00c6ff,
#0072ff);

background-size:400% 400%;

animation:bg 10s ease infinite;
}

.topbar{
background:#00bcd4;
padding:20px;
text-align:center;
font-size:25px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
}

.balance{
font-size:40px;
color:#00ff99;
margin-top:10px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00bcd4;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<div class="topbar">
لوحة التحكم
</div>

<div class="container">

<div class="card">

<h2>مرحبا بك</h2>

<p>رصيدك الحالي</p>

<div class="balance">
$5000
</div>
<div class="packages">
<div class="card">

<h2>إضافة باقة جديدة</h2>
<script>
<input id="image" placeholder="رابط الصورة">function addPackage() {

  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let daily = document.getElementById("daily").value;
  let image = document.getElementById("image").value;

  let packages = JSON.parse(localStorage.getItem("packages")) || [];

  packages.push({
    name: name,
    price: price,
    daily: daily,
    image: image
  });

  localStorage.setItem("packages", JSON.stringify(packages));
<div id="packages"></div>

<script>
let packages = JSON.parse(localStorage.getItem("packages")) || [];

let container = document.getElementById("packages");

packages.forEach(pkg => {

  container.innerHTML += `
    <div class="card">

      <img src="${pkg.image}" 
      style="width:100%;height:180px;border-radius:15px;object-fit:cover;">

      <h2>${pkg.name}</h2>
      <p>${pkg.price}$</p>
      <p>ربح يومي ${pkg.daily}$</p>

    </div>
  `;
});
</script>

}
</script>
<input type="text" id="name" placeholder="اسم الباقة">
<style>
.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  margin:15px;
  color:white;
}
</style>
<input type="number" id="price" placeholder="سعر الباقة">

<input type="number" id="profit" placeholder="الربح اليومي">

<button onclick="addPackage()">
إضافة الباقة
</button>

</div>

<div id="allPackages"></div>

</div>
</div>

<div class="card">

<button onclick="alert('قسم السحب')">
السحب
</button>

<button onclick="alert('قسم الإيداع')">
الإيداع
</button>

<button onclick="alert('قسم الأرباح')">
الأرباح
</button>

<button onclick="window.location.href='index.html'">
تسجيل الخروج
</button>

</div>

</div>

</body>
</html>
