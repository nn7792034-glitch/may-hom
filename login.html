<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

body{
margin:0;
padding:0;
font-family:Tahoma;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#00bcd4;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0097a7;
}

</style>

</head>

<body>

<div class="box">

<h2>تسجيل الدخول</h2>

<input type="text" placeholder="اسم المستخدم">

<input type="password" placeholder="كلمة السر">

<button onclick="login()">
دخول
</button>

</div>

<script>

function login(){

window.location.href = "admin.html";

}

</script>

</body>
</html>
